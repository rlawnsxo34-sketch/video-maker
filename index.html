<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숲체원 프리미엄 영상 제작소</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK 추가 (Compat 버전 활용) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <!-- 구글 폰트 추가 -->
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap');

        body { font-family: 'Pretendard', sans-serif; background-color: #e7e5e4; margin: 0; padding: 0; }
        .font-serif-kr { font-family: 'Noto Serif KR', serif; }
        .font-gowun { font-family: 'Gowun Dodum', sans-serif; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
        
        .video-container { box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3); transition: all 0.3s ease; }

        .storyboard-item.dragging { opacity: 0.5; border: 2px dashed #a8a29e; }
        .storyboard-item { transition: transform 0.2s, box-shadow 0.2s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 md:p-6 relative">

    <div class="w-full max-w-[1600px] bg-white md:rounded-[2rem] shadow-2xl overflow-hidden flex flex-col min-h-screen md:min-h-[90vh] md:max-h-[95vh] border border-stone-200 animate-fade-up">
        
        <!-- 헤더 -->
        <header class="px-6 py-4 flex justify-between items-center border-b border-stone-100 bg-white z-20">
            <div class="flex items-center gap-3 text-stone-800 font-serif-kr text-xl lg:text-2xl font-bold">
                <img src="국립장성숲체원-_국문좌우_이미지형 (2).png" alt="국립장성숲체원 로고" class="h-8 lg:h-10 object-contain" onerror="this.style.display='none'">
                <span class="hidden sm:inline border-l border-stone-300 pl-3 ml-1 text-lg lg:text-xl">통합 영상 제작소</span>
            </div>
            <div class="text-sm lg:text-base font-gowun text-stone-400 hidden sm:flex items-center gap-3">
                <!-- 🌟 내 작업물 보관소 열기 버튼 -->
                <button id="my-projects-btn" class="flex items-center gap-2 bg-stone-100 hover:bg-stone-200 text-stone-700 px-4 py-2 rounded-full transition-colors font-bold shadow-sm">
                    <i data-lucide="folder-open" class="w-4 h-4"></i> 내 작업물
                </button>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden bg-stone-50/50">
            
            <!-- 왼쪽: 설정 패널 -->
            <aside class="w-full lg:w-[520px] bg-white border-r border-stone-100 flex flex-col overflow-hidden z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    
                    <!-- 1. 화면 비율 설정 -->
                    <section class="flex flex-col gap-2">
                        <h2 class="text-base lg:text-xl font-serif-kr text-stone-800 flex items-center gap-2 font-bold">
                            <i data-lucide="ratio" class="w-5 h-5 text-stone-400"></i> 화면 비율 선택
                        </h2>
                        <div class="flex gap-2">
                            <button id="ratio-vertical" class="flex-1 py-3 border-2 border-stone-800 bg-stone-800 text-white rounded-xl font-gowun flex justify-center items-center gap-2 transition-all text-sm lg:text-base">
                                <i data-lucide="smartphone" class="w-4 h-4 lg:w-5 lg:h-5"></i> 세로형 (9:16)
                            </button>
                            <button id="ratio-horizontal" class="flex-1 py-3 border-2 border-stone-200 bg-white text-stone-600 rounded-xl font-gowun flex justify-center items-center gap-2 transition-all hover:bg-stone-50 text-sm lg:text-base">
                                <i data-lucide="monitor" class="w-4 h-4 lg:w-5 lg:h-5"></i> 가로형 (16:9)
                            </button>
                        </div>
                    </section>

                    <!-- 2. 글씨체 및 화면 전환 효과 설정 -->
                    <section class="flex flex-col gap-4 p-4 lg:p-5 bg-stone-50 rounded-2xl border border-stone-100">
                        <div class="flex flex-col gap-2">
                            <h2 class="text-base lg:text-xl font-serif-kr text-stone-800 flex items-center gap-2 font-bold">
                                <i data-lucide="type" class="w-5 h-5 text-stone-400"></i> 글씨체 및 크기 설정
                            </h2>
                            <div class="grid grid-cols-2 gap-2" id="font-selector">
                                <button data-font="Gowun Dodum" class="font-btn py-2.5 border-2 border-stone-800 bg-stone-800 text-white rounded-xl flex justify-center items-center transition-all text-sm lg:text-base" style="font-family: 'Gowun Dodum';">고운 돋움</button>
                                <button data-font="Noto Serif KR" class="font-btn py-2.5 border-2 border-stone-200 bg-white text-stone-600 rounded-xl flex justify-center items-center transition-all hover:bg-stone-50 text-sm lg:text-base" style="font-family: 'Noto Serif KR'; font-weight: 600;">클래식 명조</button>
                                <button data-font="Gowun Batang" class="font-btn py-2.5 border-2 border-stone-200 bg-white text-stone-600 rounded-xl flex justify-center items-center transition-all hover:bg-stone-50 text-sm lg:text-base" style="font-family: 'Gowun Batang';">고운 바탕</button>
                                <button data-font="Pretendard" class="font-btn py-2.5 border-2 border-stone-200 bg-white text-stone-600 rounded-xl flex justify-center items-center transition-all hover:bg-stone-50 text-sm lg:text-base" style="font-family: 'Pretendard'; font-weight: 500;">프리텐다드</button>
                            </div>

                        <!-- 영상 내부 자막 글씨 크기 조절기 -->
                        <div class="flex flex-col gap-2 pt-3 border-t border-stone-200/80">

                            <input type="range" id="canvas-font-size" min="0" max="150" value="0" class="w-full h-2 bg-stone-300 rounded-lg appearance-none cursor-pointer accent-stone-800">

                        </div>
                        
                        <div class="flex flex-col gap-2 pt-3 border-t border-stone-200/80">
                            <div class="flex items-center text-sm lg:text-base text-stone-700 font-gowun mb-1">

                            </div>

                                <option value="fadeblack">🎬 필름 블랙 아웃 (영화처럼 어두워짐)</option>
                                <option value="slide">📸 포토 슬라이드 (옆으로 밀려남)</option>
                            </select>

                    </section>

                    <!-- 3. 프리미엄 BGM 설정 -->
                    <section class="p-4 bg-stone-50 rounded-2xl border border-stone-100">
                        <h2 class="text-base lg:text-xl font-serif-kr mb-3 text-stone-800 flex items-center gap-2 font-bold">

                            <option value="https://ia802506.us.archive.org/16/items/nature-sounds-birds-singing-relaxing/nature-sounds-birds-singing.mp3">🐤 아침 숲의 소리 (실제 새 지저귐)</option>
                            <option value="https://ia801402.us.archive.org/20/items/free_music_archive_instrumental/FMA_Instrumental_Selection_-_01_-_Gillicuddy_-_Springish.mp3">🎸 숲속의 봄날 (감성 어쿠스틱 기타)</option>

                    <!-- 5. 통합 스토리보드 에디터 -->

                        <div class="flex justify-between items-end mb-3">
                            <h2 class="text-base lg:text-xl font-serif-kr text-stone-800 flex items-center gap-2 font-bold">
                                <i data-lucide="clapperboard" class="w-5 h-5 text-stone-400"></i> 스토리보드 편집

                        </div>

            <!-- 오른쪽: 플레이어 영역 -->
            <main class="flex-1 flex flex-col relative bg-stone-200/50 overflow-hidden items-center justify-center p-4">

                <!-- 플레이어 컨트롤 -->

                        <i data-lucide="play" class="w-4 h-4 lg:w-5 lg:h-5 ml-1"></i>
                    </button>
                    <button id="stop-btn" class="w-10 h-10 lg:w-12 lg:h-12 rounded-full hover:bg-stone-100 flex items-center justify-center text-stone-500 transition active:scale-95 disabled:opacity-50">

                    <div class="flex-1 flex items-center gap-3 px-1">
                        <span id="current-time-display" class="text-[10px] lg:text-xs font-mono text-stone-500">00:00</span>
                        <div class="flex-1 h-1.5 lg:h-2 bg-stone-100 rounded-full cursor-pointer relative overflow-hidden" id="progress-bar-container">

    <!-- 🌟 내 작업물 보관소 모달 UI -->
    <div id="projects-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[85vh] animate-fade-up">
            <div class="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                <h2 class="text-xl lg:text-2xl font-serif-kr font-bold text-stone-800 flex items-center gap-2">
                    <i data-lucide="hard-drive" class="w-6 h-6 text-stone-600"></i> 내 작업물 보관소
                </h2>
                <button id="close-modal-btn" class="text-stone-400 hover:text-stone-700 transition-colors p-2 rounded-full hover:bg-stone-200">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="projects-list" class="p-6 overflow-y-auto flex-1 bg-white grid grid-cols-1 gap-4">
                <!-- JS 동적 생성 위치 -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function formatTime(seconds) {
            if(isNaN(seconds) || seconds < 0) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function drawWrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const paragraphs = text.split('\n');
            let lines = [];
            paragraphs.forEach(p => {
                const words = p.split(' ');
                let currentLine = '';
                for(let n = 0; n < words.length; n++) {
                    const testLine = currentLine + words[n] + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) {
                        lines.push(currentLine); currentLine = words[n] + ' ';
                    } else { currentLine = testLine; }
                }
                lines.push(currentLine);
            });
            const totalHeight = lines.length * lineHeight;
            let startY = y - (totalHeight / 2) + (lineHeight / 2);
            for(let i=0; i<lines.length; i++) {
                ctx.fillText(lines[i].trim(), x, startY + (i * lineHeight));
            }
        }

        const premiumPhrases = [
            "따스한 햇살 아래, 오롯이 나를 만나는 시간",
            "초록빛 숨결 속에서 일상의 피로를 씻어냅니다",
            "바람이 들려주는 고요하고 다정한 이야기",
            "한 걸음 느리게, 찬란했던 계절과 동화되는 순간",
            "나무 사이로 스며든 눈부신 숲의 활기",
            "햇살이 머무는 곳, 자연이 내어준 포근한 휴식",
            "마음의 무거운 짐을 잠시 내려놓습니다",
            "우리 함께 걸었던 깊고 따뜻한 정취",
            "나뭇잎 사이로 부서지는 맑은 에너지",
            "고요한 숲의 정적 속에서 되찾는 마음의 평화"
        ];
        function getRandomPhrase() { return premiumPhrases[Math.floor(Math.random() * premiumPhrases.length)]; }

        const effectTypes = ['zoom-in', 'zoom-out', 'pan-left', 'pan-right', 'pan-up', 'pan-down'];

        const particles = Array.from({length: 60}, () => ({
            x: Math.random() * 1920, y: Math.random() * 1920, radius: Math.random() * 3 + 1,
            vx: (Math.random() - 0.5) * 0.5, vy: Math.random() * 0.5 + 0.2, alpha: Math.random() * 0.5 + 0.1
        }));

        // 오디오 라우팅 및 렌더링 엔진 로직
        function startProceduralAmbient() {
            stopProceduralAmbient();
            setupAudioRouting();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            
            let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179; b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520; b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522; b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                output[i] *= 0.05; b6 = white * 0.115926;
            }

            const noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = noiseBuffer; noiseNode.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(250, audioCtx.currentTime); filter.Q.setValueAtTime(3, audioCtx.currentTime);
            windGain = audioCtx.createGain(); windGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            noiseNode.connect(filter); filter.connect(windGain); windGain.connect(audioDest); noiseNode.start(); windNode = noiseNode;

            let step = 0;
            function modulateWind() {
                if (!state.isPlaying && !state.isRecording) return;
                step += 0.03; filter.frequency.setValueAtTime(220 + Math.sin(step) * 100, audioCtx.currentTime); setTimeout(modulateWind, 60);
            }
            modulateWind();

            const chimeChords = [329.63, 392.00, 440.00, 523.25, 587.33, 659.25]; 
            chimeInterval = setInterval(() => {
                if (!state.isPlaying && !state.isRecording) return;
                if (Math.random() > 0.45) playBell(chimeChords[Math.floor(Math.random() * chimeChords.length)]);
            }, 1400);
        }

        function playBell(pitch) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.08); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3.5); 
            osc.connect(gain); gain.connect(audioDest); osc.start(); osc.stop(audioCtx.currentTime + 3.6);
        }

        function stopProceduralAmbient() {
            if (windNode) { try { windNode.stop(); } catch(e){} windNode = null; }
            if (chimeInterval) { clearInterval(chimeInterval); chimeInterval = null; }
        }

        async function handleImageUpload(e) {
            const files = Array.from(e.target.files);

            for (const file of files) {
                if ((state.images.length + addedCount + 1) * 4 > maxDuration) { if (addedCount === 0) alert(`최대 길이 제한에 도달했습니다.`); break; }
                validFiles.push(file); addedCount++;
            }
            if (validFiles.length === 0) { e.target.value = ''; return; }

            const loadPromises = validFiles.map(file => new Promise((resolve) => {
                const isVideo = file.type.startsWith('video/') || file.name.match(/\.(mp4|mov|avi|mkv|webm)$/i);
                const dataUrl = URL.createObjectURL(file); // 메모리 최적화 URL 생성
                
                if (isVideo) {
                    const video = document.createElement('video'); video.src = dataUrl; video.muted = true; video.playsInline = true; video.preload = "auto";

        function createSegmentCard(type, index, data) {
            const div = document.createElement('div');
            div.className = 'bg-stone-50 border border-stone-200 rounded-xl p-4 flex gap-4 storyboard-item items-start shadow-sm';
            
            let label = '', icon = '';
            if(type === 'intro') { label = '인트로'; icon = 'play-square'; }
            if(type === 'outro') { label = '아웃트로'; icon = 'film'; }

            let thumbHTML = '';
            if (type === 'slide') {
                div.draggable = true;
                div.addEventListener('dragstart', (e) => { state.draggedItemIndex = index; div.classList.add('dragging'); });
                div.addEventListener('dragend', () => { div.classList.remove('dragging'); state.draggedItemIndex = null; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if(state.draggedItemIndex === null || state.draggedItemIndex === index) return;
                    const item = state.images.splice(state.draggedItemIndex, 1)[0]; state.images.splice(index, 0, item);
                    updateDurations(); renderStoryboard(); if(!state.isPlaying) drawFrame(0);
                });

                const isVideo = data.type === 'video';
                const iconOverlay = isVideo ? `<div class="absolute top-1.5 right-1.5 bg-stone-900/80 p-1 rounded text-white shadow"><i data-lucide="video" class="w-3.5 h-3.5"></i></div>` : '';
                const mediaTag = isVideo ? `<video src="${data.src}#t=1" class="w-full h-full object-cover" muted preload="metadata"></video>` : `<img src="${data.src}" class="w-full h-full object-cover">`;

                thumbHTML = `<div class="w-16 lg:w-20 h-24 lg:h-28 shrink-0 rounded-lg overflow-hidden bg-stone-200 relative cursor-grab shadow-inner">${mediaTag}<div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity"><i data-lucide="grip-vertical" class="text-white w-5 h-5"></i></div>${iconOverlay}</div>`;
            } else {
                thumbHTML = `<div class="w-16 lg:w-20 h-24 lg:h-28 shrink-0 rounded-lg bg-stone-800 text-stone-300 flex flex-col items-center justify-center gap-1"><i data-lucide="${icon}" class="w-5 h-5 lg:w-6 lg:h-6"></i><span class="text-[10px] lg:text-xs font-semibold">${label}</span></div>`;
            }

            let inputsHTML = '';
            if (type === 'intro' || type === 'outro') {
                inputsHTML = `<textarea class="w-full bg-white border border-stone-200 rounded-lg px-2.5 py-1.5 text-xs lg:text-sm font-serif-kr text-stone-800 resize-none h-[44px] mb-1 focus:outline-none focus:border-stone-400" onchange="updateState('${type}', ${index}, 'title', this.value)" placeholder="위쪽 메인 문구">${data.title}</textarea>
                    <input type="text" class="w-full bg-white border border-stone-200 rounded-lg px-2.5 py-1.5 text-[11px] lg:text-xs font-gowun text-stone-500 focus:outline-none focus:border-stone-400" value="${data.subtitle}" onchange="updateState('${type}', ${index}, 'subtitle', this.value)" placeholder="아래쪽 서브 문구">`;
            } else {
                inputsHTML = `<div class="flex gap-1 w-full relative"><textarea class="w-full bg-white border border-stone-200 rounded-lg px-2.5 py-1.5 text-xs lg:text-sm font-gowun text-stone-700 resize-none h-[60px] focus:outline-none focus:border-stone-400" onchange="updateState('slide', ${index}, 'phrase', this.value)" placeholder="감성 문구">${data.phrase}</textarea><button onclick="applyRandomPhrase(${index})" class="absolute bottom-1.5 right-1.5 bg-stone-100 p-1 rounded-md text-stone-500 hover:bg-stone-200 transition-colors" title="랜덤 추천"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i></button></div>`;
            }

            const controlsHTML = `<div class="flex justify-between items-center mt-2"><div class="flex items-center gap-1 text-[11px] lg:text-xs text-stone-500 font-gowun"><i data-lucide="clock" class="w-3.5 h-3.5"></i><input type="number" min="1" max="100" class="w-10 bg-transparent border-b border-stone-300 text-center font-bold text-stone-700 focus:outline-none" value="${data.duration}" onchange="updateState('${type}', ${index}, 'duration', parseInt(this.value)||3)"> 초 재생</div>${type === 'slide' ? `<button onclick="removeImage(${index})" class="text-stone-400 hover:text-red-500 transition-colors p-1" title="제거"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}</div>`;
            div.innerHTML = `${thumbHTML}<div class="flex-1 flex flex-col justify-between h-full">${inputsHTML}${controlsHTML}</div>`;
            return div;
        }

        window.updateState = (type, index, key, value) => {
            if(type === 'intro') state.intro[key] = value; else if(type === 'outro') state.outro[key] = value; else if(type === 'slide') state.images[index][key] = value;
            updateDurations(); if(!state.isPlaying) drawFrame(state.currentTime);
        };

        window.applyRandomPhrase = (index) => { state.images[index].phrase = getRandomPhrase(); renderStoryboard(); if(!state.isPlaying) drawFrame(state.currentTime); };

        window.removeImage = (index) => {
            const item = state.images[index];
            if (item.type === 'video') { item.mediaElement.pause(); item.mediaElement.removeAttribute('src'); item.mediaElement.load(); }
            URL.revokeObjectURL(item.src); // 메모리 해제
            state.images.splice(index, 1);
            updateDurations(); renderStoryboard(); updateUI(); if(!state.isPlaying) drawFrame(0);
        };

        function updateDurations() {
            let total = state.intro.duration + state.outro.duration;
            state.images.forEach(img => total += img.duration);
            state.totalDuration = total;
            elements.totalTimeDisplay.textContent = formatTime(state.totalDuration);
            elements.estimatedTimeDisplay.textContent = formatTime(state.totalDuration);
        }

        // ==========================================
        // 프로젝트 저장 / 불러오기 로직 (Firebase Cloud 연동)
        // ==========================================
        async function saveProject(statusStr) {
            if (!db || !storage) {
                alert("Firebase 설정(API Key 등)이 완료되지 않아 저장할 수 없습니다.");
                return;
            }
            if (state.images.length === 0 && statusStr === 'draft') {
                alert("최소 1개 이상의 미디어를 추가해야 저장할 수 있습니다.");
                return;
            }

            elements.loadingOverlay.style.display = 'flex';
            elements.loadingOverlay.querySelector('h3').textContent = "클라우드 저장 중...";
            elements.loadingOverlay.querySelector('p').textContent = "미디어 파일을 안전하게 클라우드로 업로드하고 있습니다.";

            if (!state.projectId) state.projectId = "proj_" + Date.now();

            try {
                // 1. 미디어 파일 Firebase Storage 업로드
                const uploadedImages = [];
                for (let i = 0; i < state.images.length; i++) {
                    const img = state.images[i];
                    elements.renderTimeText.textContent = `미디어 클라우드 업로드 중... (${i+1}/${state.images.length})`;
                    
                    let mediaUrl = img.src;
                    // 새롭게 업로드한 로컬 파일(File 객체)일 경우 클라우드에 업로드
                    if (img.rawFile) {
                        const fileExt = img.rawFile.name.split('.').pop();
                        const fileName = `${state.projectId}_${img.id}.${fileExt}`;
                        const storageRef = storage.ref(`projects/${state.projectId}/${fileName}`);
                        await storageRef.put(img.rawFile);
                        mediaUrl = await storageRef.getDownloadURL();
                    }
                    
                    uploadedImages.push({
                        id: img.id, type: img.type, src: mediaUrl, effect: img.effect, phrase: img.phrase, duration: img.duration
                        // rawFile은 데이터베이스에 직렬화 불가하므로 제외
                    });
                }

                // 2. 프로젝트 메타데이터 Firestore 저장
                elements.renderTimeText.textContent = "데이터베이스 기록 중...";
                const projectData = {
                    id: state.projectId,
                    name: elements.projectTitle.value || "숲체원의 추억",
                    status: statusStr,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    data: {
                        aspectRatio: state.aspectRatio, fontFamily: state.fontFamily, transitionEffect: state.transitionEffect,
                        intro: state.intro, outro: state.outro, images: uploadedImages
                    }
                };

                await db.collection("projects").doc(state.projectId).set(projectData);
                
                elements.loadingOverlay.style.display = 'none';
                if(statusStr === 'draft') alert("클라우드 보관소에 성공적으로 임시저장 되었습니다!");
            } catch(e) {
                elements.loadingOverlay.style.display = 'none';
                console.error(e);
                alert("클라우드 저장 중 오류가 발생했습니다. 파이어베이스 권한 설정(Rules)을 확인하세요.");
            }
        }

        async function openProjectsModal() {

            elements.projectsList.innerHTML = '<div class="text-center text-stone-500 py-10">클라우드에서 데이터를 불러오는 중...</div>';

                                <button onclick="deleteProject('${p.id}')" class="bg-stone-100 hover:bg-red-50 text-stone-500 hover:text-red-500 px-3 py-2 rounded-xl transition-colors" title="삭제">

        window.loadProject = async (id) => {
            elements.projectsModal.classList.add('hidden');
            elements.loadingOverlay.style.display = 'flex';
            elements.loadingOverlay.querySelector('h3').textContent = "클라우드에서 불러오는 중...";
            elements.loadingOverlay.querySelector('p').textContent = "저장된 고화질 원본 데이터를 동기화 중입니다.";
            elements.renderTimeText.textContent = "";
            
            try {
                const docSnap = await db.collection("projects").doc(id).get();
                if(!docSnap.exists) throw "데이터베이스에 프로젝트가 없습니다.";
                const target = docSnap.data();

                // 기존 메모리 캐시 청소
                state.images.forEach(img => {
                    if (img.type === 'video') img.mediaElement.pause();
                    if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
                });

                state.projectId = target.id;
                elements.projectTitle.value = target.name;
                
                // 상태 복원
                state.aspectRatio = target.data.aspectRatio;
                state.fontFamily = target.data.fontFamily;
                state.transitionEffect = target.data.transitionEffect;
                state.intro = target.data.intro;
                state.outro = target.data.outro;

                setFont(state.fontFamily);
                setAspectRatio(state.aspectRatio);
                elements.transitionEffectSelect.value = state.transitionEffect;

                // 클라우드 URL을 기반으로 미디어 파일 복원 (CORS 허용)
                const loadPromises = target.data.images.map(imgData => new Promise((resolve) => {
                    if (imgData.type === 'video') {
                        const video = document.createElement('video');
                        video.crossOrigin = "anonymous"; // 클라우드 영상 추출을 위한 필수 속성
                        video.src = imgData.src; 
                        video.muted = true; video.playsInline = true; video.preload = "auto";
                        video.onloadeddata = () => resolve({ ...imgData, rawFile: null, mediaElement: video });
                        video.onerror = () => resolve({ ...imgData, rawFile: null, mediaElement: video });
                        video.load();
                    } else {
                        const img = new Image();
                        img.crossOrigin = "anonymous"; // 클라우드 사진 추출을 위한 필수 속성
                        img.onload = () => resolve({ ...imgData, rawFile: null, mediaElement: img });
                        img.onerror = () => resolve({ ...imgData, rawFile: null, mediaElement: img });
                        img.src = imgData.src;
                    }
                }));

                state.images = await Promise.all(loadPromises);
                updateDurations();
                renderStoryboard();
                updateUI();
                if(!state.isPlaying) drawFrame(0);

            } catch(e) {
                console.error(e);
                alert("프로젝트 복구 중 문제가 발생했습니다.");
            }
            elements.loadingOverlay.style.display = 'none';
        };

        window.deleteProject = async (id) => {
            if(!confirm("정말로 이 작업물을 삭제하시겠습니까? (클라우드에서도 완전히 삭제됩니다)")) return;
            try {
                await db.collection("projects").doc(id).delete();
                openProjectsModal(); // 리스트 갱신
                if(state.projectId === id) state.projectId = null; 
            } catch(e) {
                alert("삭제 권한이 없거나 실패했습니다.");
            }
        };

        // ==========================================
        // 동적 트랜지션 렌더링 엔진 (사진 및 비디오 모두 처리)
        // ==========================================
        function getSceneContext(time) {
            if (time < state.intro.duration) return { type: 'intro', elapsed: time, duration: state.intro.duration };
            let acc = state.intro.duration;
            for (let i = 0; i < state.images.length; i++) {
                if (time < acc + state.images[i].duration) return { type: 'slide', index: i, elapsed: time - acc, duration: state.images[i].duration };
                acc += state.images[i].duration;
            }
            return { type: 'outro', elapsed: time - acc, duration: state.outro.duration };
        }

        function renderSlideTransition(ctx, prevObj, currentObj, cw, ch, fadeElapsed, fadeDuration) {
            const progress = Math.max(0, Math.min(fadeElapsed / fadeDuration, 1.0));
            const theme = state.transitionEffect;
            if (theme === 'crossfade') {
                renderSlideImage(ctx, prevObj, cw, ch, prevObj.duration + fadeElapsed, 1 - progress);
                renderSlideImage(ctx, currentObj, cw, ch, fadeElapsed, progress);
            } 
            else if (theme === 'fadeblack') {
                if (progress < 0.5) renderSlideImage(ctx, prevObj, cw, ch, prevObj.duration + fadeElapsed, 1 - (progress * 2));
                else renderSlideImage(ctx, currentObj, cw, ch, fadeElapsed, (progress - 0.5) * 2);
            } 
            else if (theme === 'slide') {
                const slideDistance = cw;
                ctx.save(); ctx.translate(-(progress * slideDistance), 0); renderSlideImage(ctx, prevObj, cw, ch, prevObj.duration + fadeElapsed, 1.0); ctx.restore();
                ctx.save(); ctx.translate(slideDistance - (progress * slideDistance), 0); renderSlideImage(ctx, currentObj, cw, ch, fadeElapsed, 1.0); ctx.restore();
                const shadowX = slideDistance - (progress * slideDistance);
                if(shadowX > 0 && shadowX < cw) {
                    const grad = ctx.createLinearGradient(shadowX, 0, shadowX - 100, 0);
                    grad.addColorStop(0, 'rgba(0,0,0,0.8)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.fillRect(shadowX - 100, 0, 100, ch);
                }
            }
        }

        function renderSlideImage(ctx, mediaObj, cw, ch, elapsed, alpha) {
            ctx.globalAlpha = alpha; ctx.filter = 'blur(60px) brightness(0.25) sepia(0.2)';
            
            if (mediaObj.type === 'video') {
                const vid = mediaObj.mediaElement;
                if (!state.isPlaying && !state.isRecording) { vid.currentTime = elapsed % vid.duration; if (!vid.paused) vid.pause(); } 
                else { if (vid.paused) vid.play().catch(e=>{}); if (Math.abs(vid.currentTime - (elapsed % vid.duration)) > 0.4) vid.currentTime = elapsed % vid.duration; }
            }

            drawCoverImage(ctx, mediaObj.mediaElement, cw, ch); ctx.filter = 'none';
            const p = Math.max(0, elapsed / (mediaObj.duration + 1.5)); 
            let scale = 1.0, transX = 0, transY = 0; const drift = 40; 
            switch(mediaObj.effect) {
                case 'zoom-in':   scale = 1.0 + (p * 0.08); break; case 'zoom-out':  scale = 1.08 - (p * 0.08); break;
                case 'pan-left':  scale = 1.05; transX = (drift/2) - (p*drift); break; case 'pan-right': scale = 1.05; transX = -(drift/2) + (p*drift); break;
                case 'pan-up':    scale = 1.05; transY = (drift/2) - (p*drift); break; case 'pan-down':  scale = 1.05; transY = -(drift/2) + (p*drift); break;
                case 'none':      break; 
            }
            ctx.save(); ctx.translate(cw/2 + transX, ch/2 + transY); ctx.scale(scale, scale); ctx.translate(-cw/2, -ch/2);
            ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 80; ctx.shadowOffsetY = 30;
            drawDynamicFineArtFrame(ctx, mediaObj.mediaElement, cw, ch); ctx.restore();
        }

        function drawDynamicFineArtFrame(ctx, media, cw, ch) {
            const isVertical = ch > cw; const paddingX = isVertical ? 120 : 250; const paddingTop = isVertical ? 300 : 150; const paddingBottom = isVertical ? 450 : 250;
            const availW = cw - (paddingX * 2); const availH = ch - paddingTop - paddingBottom;
            const mediaW = media.videoWidth || media.width || cw; const mediaH = media.videoHeight || media.height || ch;
            const mediaRatio = mediaW / mediaH; const availRatio = availW / availH;
            let drawW = availW, drawH = availH;
            if (mediaRatio > availRatio) drawH = availW / mediaRatio; else drawW = availH * mediaRatio;
            const offsetX = (cw - drawW) / 2, offsetY = paddingTop + (availH - drawH) / 2;

            ctx.fillStyle = '#fefefe'; const borderSize = isVertical ? 20 : 16;
            ctx.fillRect(offsetX - borderSize, offsetY - borderSize, drawW + (borderSize*2), drawH + (borderSize*2));
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2; ctx.strokeRect(offsetX, offsetY, drawW, drawH);
            ctx.drawImage(media, offsetX, offsetY, drawW, drawH);
        }

        function drawFrame(timeInSeconds) {
            const ctx = elements.ctx; const width = elements.canvas.width; const height = elements.canvas.height; const isVertical = height > width;
            ctx.fillStyle = '#111827'; ctx.fillRect(0, 0, width, height);

            if(state.images.length === 0) return;
            const scene = getSceneContext(timeInSeconds);
            const userFontSize = parseInt(elements.canvasFontSize.value);
            let fontSizeIntroTitle = isVertical ? 80 : 110; let fontSizeIntroSubtitle = isVertical ? 48 : 64; let fontSizeSlide = isVertical ? 56 : 72; let lineHeightSlide = isVertical ? 72 : 96;
            if (userFontSize > 0) { fontSizeSlide = userFontSize; lineHeightSlide = Math.round(userFontSize * 1.3); fontSizeIntroTitle = Math.round(userFontSize * 1.4); fontSizeIntroSubtitle = Math.round(userFontSize * 0.85); }

            if (scene.type === 'intro') {
                let alpha = Math.min(scene.elapsed / 1.5, 1); if (scene.duration - scene.elapsed < 1) alpha = scene.duration - scene.elapsed;
                ctx.globalAlpha = alpha; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 15; ctx.fillStyle = '#f5f5f4'; ctx.font = `400 ${fontSizeIntroTitle}px "${state.fontFamily}", sans-serif`;
                drawWrapText(ctx, state.intro.title, width/2, height/2 - (isVertical?60:40), width * 0.85, Math.round(fontSizeIntroTitle * 1.25));
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.fillStyle = '#a8a29e'; ctx.font = `300 ${fontSizeIntroSubtitle}px "Pretendard", sans-serif`;
                drawWrapText(ctx, state.intro.subtitle, width/2, height/2 + (isVertical?80:90), width * 0.85, Math.round(fontSizeIntroSubtitle * 1.25));
            } 
            else if (scene.type === 'outro') {
                let alpha = Math.min(scene.elapsed / 1.5, 1); ctx.globalAlpha = alpha; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 15; ctx.fillStyle = '#f5f5f4'; ctx.font = `300 ${Math.round(fontSizeIntroTitle * 0.7)}px "${state.fontFamily}", sans-serif`;
                drawWrapText(ctx, state.outro.title, width/2, height/2 - (isVertical?60:50), width * 0.85, Math.round(fontSizeIntroTitle * 0.9));
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10; ctx.fillStyle = '#a8a29e'; ctx.font = `300 ${fontSizeIntroSubtitle}px "Pretendard", sans-serif`;
                drawWrapText(ctx, state.outro.subtitle, width/2, height/2 + (isVertical?80:80), width * 0.85, Math.round(fontSizeIntroSubtitle * 1.25));
            } 
            else if (scene.type === 'slide') {
                const imgObj = state.images[scene.index];
                const fadeDuration = state.transitionEffect === 'fadeblack' ? 1.5 : 1.0; 
                let isFading = (scene.elapsed < fadeDuration && scene.index > 0);
                if (isFading) { const prevObj = state.images[scene.index - 1]; renderSlideTransition(ctx, prevObj, imgObj, width, height, scene.elapsed, fadeDuration); } 
                else { renderSlideImage(ctx, imgObj, width, height, scene.elapsed, 1.0); }

                ctx.globalAlpha = 1.0; const vignette = ctx.createRadialGradient(width/2, height/2, width/2.5, width/2, height/2, width*1.2);
                vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.85)'); ctx.fillStyle = vignette; ctx.fillRect(0, 0, width, height);

                ctx.globalAlpha = 1.0; ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                particles.forEach(p => {
                    if(state.isPlaying || state.isRecording) { p.x += p.vx; p.y += p.vy; if(p.x < 0) p.x = width; if(p.x > width) p.x = 0; if(p.y < 0) p.y = height; if(p.y > height) p.y = 0; }
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                });

                const gradHeight = isVertical ? 600 : 400; const gradient = ctx.createLinearGradient(0, height - gradHeight, 0, height);
                gradient.addColorStop(0, 'rgba(15, 15, 15, 0)'); gradient.addColorStop(0.7, 'rgba(15, 15, 15, 0.9)'); gradient.addColorStop(1, 'rgba(15, 15, 15, 1)');
                ctx.fillStyle = gradient; ctx.fillRect(0, height - gradHeight, width, gradHeight);

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const currentPhrase = imgObj.phrase || ""; const prevPhrase = scene.index > 0 ? (state.images[scene.index - 1].phrase || "") : "";
                const textY = height - (isVertical ? 220 : 160);

                ctx.fillStyle = '#e7e5e4'; ctx.font = `400 ${fontSizeSlide}px "${state.fontFamily}", sans-serif`; ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 15;
                const maxWidth = width * 0.85; 

                if (isFading && prevPhrase !== currentPhrase) {
                    ctx.globalAlpha = 1 - Math.max(0, Math.min(scene.elapsed / fadeDuration, 1.0)); drawWrapText(ctx, prevPhrase, width / 2, textY, maxWidth, lineHeightSlide);
                    ctx.globalAlpha = Math.max(0, Math.min(scene.elapsed / fadeDuration, 1.0)); drawWrapText(ctx, currentPhrase, width / 2, textY, maxWidth, lineHeightSlide);
                } else { ctx.globalAlpha = 1.0; drawWrapText(ctx, currentPhrase, width / 2, textY, maxWidth, lineHeightSlide); }
            }
            
            ctx.globalAlpha = 1.0;
            if (watermarkLogo.complete && watermarkLogo.naturalWidth > 0) {
                const logoW = isVertical ? 350 : 280; const logoH = watermarkLogo.naturalHeight * (logoW / watermarkLogo.naturalWidth);
                const logoX = width - logoW - (isVertical ? 60 : 50); const logoY = isVertical ? 100 : 40; const outline = 3; 
                ctx.shadowColor = 'white'; ctx.shadowBlur = 2; 
                const offsets = [ [-outline, 0], [outline, 0], [0, -outline], [0, outline], [-outline, -outline], [outline, -outline], [-outline, outline], [outline, outline] ];
                offsets.forEach(off => { ctx.shadowOffsetX = off[0]; ctx.shadowOffsetY = off[1]; ctx.drawImage(watermarkLogo, logoX, logoY, logoW, logoH); });
                ctx.shadowColor = 'transparent'; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.drawImage(watermarkLogo, logoX, logoY, logoW, logoH);
            }
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0; updateProgressUI(timeInSeconds);
        }

        function drawCoverImage(ctx, media, cw, ch) {
            const mediaW = media.videoWidth || media.width || cw; const mediaH = media.videoHeight || media.height || ch;
            const mediaRatio = mediaW / mediaH; const canvasRatio = cw / ch;
            let drawW = cw, drawH = ch, offsetX = 0, offsetY = 0;
            if (mediaRatio > canvasRatio) { drawW = ch * mediaRatio; offsetX = (cw - drawW) / 2; } else { drawH = cw / mediaRatio; offsetY = (ch - drawH) / 2; }
            ctx.drawImage(media, offsetX, offsetY, drawW, drawH);
        }

        function updateUI() {
            const hasImages = state.images.length > 0; elements.emptyState.style.display = hasImages ? 'none' : 'flex';
            elements.playBtn.disabled = !hasImages; elements.stopBtn.disabled = !hasImages; elements.exportBtn.disabled = !hasImages;
            elements.playBtn.innerHTML = state.isPlaying ? '<i data-lucide="pause" class="w-4 h-4"></i>' : '<i data-lucide="play" class="w-4 h-4 ml-1"></i>'; lucide.createIcons();
        }

        function setupAudioRouting() {
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioDest = audioCtx.createMediaStreamDestination(); audioSource = audioCtx.createMediaElementSource(elements.bgmAudio); audioSource.connect(audioDest); audioSource.connect(audioCtx.destination); } catch(e) {}
            }
        }

        function togglePlay() {
            if (state.images.length === 0) return; setupAudioRouting(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (state.isPlaying) { state.isPlaying = false; cancelAnimationFrame(state.animationFrameId); elements.bgmAudio.pause(); stopProceduralAmbient(); } 
            else {
                state.isPlaying = true; state.lastTimestamp = performance.now(); if (state.currentTime >= state.totalDuration) state.currentTime = 0;
                if (elements.bgmSelect.value === 'procedural') startProceduralAmbient(); else if(elements.bgmAudio.src) { elements.bgmAudio.currentTime = state.currentTime % (elements.bgmAudio.duration || state.totalDuration || 1); elements.bgmAudio.play().catch(e => {}); }
                animationLoop(performance.now());
            }
            updateUI();
        }

        function stopPlayback() {
            state.isPlaying = false; cancelAnimationFrame(state.animationFrameId); state.currentTime = 0; elements.bgmAudio.pause(); elements.bgmAudio.currentTime = 0;
            stopProceduralAmbient(); state.images.forEach(img => { if(img.type === 'video' && !img.mediaElement.paused) img.mediaElement.pause(); }); drawFrame(0); updateUI();
        }

        function seekTime(e) {
            if (state.images.length === 0) return; const rect = elements.progressContainer.getBoundingClientRect(); state.currentTime = Math.max(0, Math.min(((e.clientX - rect.left) / rect.width) * state.totalDuration, state.totalDuration));
            if (elements.bgmAudio.src && elements.bgmSelect.value !== 'procedural') elements.bgmAudio.currentTime = state.currentTime % (elements.bgmAudio.duration || state.totalDuration || 1); drawFrame(state.currentTime);
        }

        function animationLoop(timestamp) {
            if (!state.isPlaying) return; state.currentTime += (timestamp - state.lastTimestamp) / 1000; state.lastTimestamp = timestamp;
            if (state.currentTime >= state.totalDuration) { state.currentTime = state.totalDuration; drawFrame(state.currentTime); stopPlayback(); return; }
            drawFrame(state.currentTime); state.animationFrameId = requestAnimationFrame(animationLoop);
        }

        function updateProgressUI(time) {
            if (state.totalDuration > 0) { elements.progressBar.style.width = `${(time / state.totalDuration) * 100}%`; elements.currentTimeDisplay.textContent = formatTime(time); }
        }

        async function exportVideoAndSave() {
            await saveProject('final'); // 영상 추출 전 최종본으로 상태 업데이트 저장
            if (state.images.length === 0 || state.isRecording) return;
            if(state.isPlaying) stopPlayback();
            
            state.isRecording = true; elements.loadingOverlay.style.display = 'flex'; elements.exportBtn.disabled = true;
            elements.loadingOverlay.querySelector('h3').textContent = "고화질 영상 렌더링 중...";
            elements.loadingOverlay.querySelector('p').textContent = "브라우저 창을 유지해 주세요.";

            setupAudioRouting(); if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            const fps = 30; let canvasStream;
            try { canvasStream = elements.canvas.captureStream(fps); } catch (err) { alert("보안 정책(CORS)으로 추출이 차단되었습니다."); elements.loadingOverlay.style.display = 'none'; state.isRecording = false; elements.exportBtn.disabled = false; return; }
            
            let tracks = [...canvasStream.getVideoTracks()];
            if (audioDest) { const audioTracks = audioDest.stream.getAudioTracks(); if (audioTracks.length > 0) tracks = [...tracks, ...audioTracks]; }
            const combinedStream = new MediaStream(tracks);

            let options = {}; let ext = 'mp4';
            if (MediaRecorder.isTypeSupported('video/mp4; codecs="avc1, mp4a.40.2"')) options = { mimeType: 'video/mp4; codecs="avc1, mp4a.40.2"' };
            else if (MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/mp4' };
            else if (MediaRecorder.isTypeSupported('video/webm; codecs=vp9,opus')) { options = { mimeType: 'video/webm; codecs=vp9,opus' }; ext = 'webm'; } 
            else { options = { mimeType: 'video/webm' }; ext = 'webm'; }
            
            const recorder = new MediaRecorder(combinedStream, options); const chunks = [];
            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
                if(elements.bgmAudio.src) { elements.bgmAudio.pause(); elements.bgmAudio.currentTime = 0; } stopProceduralAmbient();
                state.images.forEach(img => { if(img.type === 'video' && !img.mediaElement.paused) img.mediaElement.pause(); });
                const a = document.createElement('a'); a.style.display = 'none'; a.href = URL.createObjectURL(new Blob(chunks, { type: options.mimeType || 'video/mp4' }));
                a.download = `숲체원_영상_${Date.now()}.${ext}`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
                state.isRecording = false; elements.loadingOverlay.style.display = 'none'; elements.exportBtn.disabled = false; drawFrame(0);
            };
            
            if (elements.bgmSelect.value === 'procedural') startProceduralAmbient(); else if(elements.bgmAudio.src) { elements.bgmAudio.currentTime = 0; try { elements.bgmAudio.play(); } catch(e) {} }
            recorder.start();
            
            let renderTime = 0; const timeStep = 1 / fps;
            function renderNextFrame() {
                if (renderTime > state.totalDuration) { recorder.stop(); return; } drawFrame(renderTime);
                elements.renderProgress.style.width = `${(renderTime / state.totalDuration) * 100}%`; elements.renderTimeText.textContent = `${formatTime(renderTime)} / ${formatTime(state.totalDuration)}`;
                renderTime += timeStep; setTimeout(renderNextFrame, 1000 / fps);
            }
            renderNextFrame();
        }

        init();
    </script>
</body>
